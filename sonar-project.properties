# SonarQube Cloud (SonarCloud) project analysis settings.
# Set project identity in CI if you don't commit it here:
# sonar.projectKey=your_project_key
# sonar.organization=your_organization
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# React app source roots.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Ignore build artifacts and generated files.
sonar.exclusions=dist/**,node_modules/**,coverage/**,**/*.d.ts,**/routeTree.gen.ts
sonar.coverage.exclusions=src/main.tsx,src/vite-env.d.ts

# Vitest coverage output consumed by SonarQube Cloud.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Required for local Docker-based scans (prevents hang on ARM Macs).
sonar.scm.disabled=true

# Suppress Tailwind CSS v4 false positive — @custom-variant is valid syntax.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e1.resourceKey=src/index.css
