# SonarQube Cloud (SonarCloud) project analysis settings.
# Set project identity in CI if you don't commit it here:
sonar.projectKey=omarcresp_b2b-vertical-ai-health-saas
sonar.organization=omarcresp
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# React app source roots.
sonar.sources=src,convex
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Ignore build artifacts and generated files.
sonar.exclusions=dist/**,node_modules/**,coverage/**,**/*.d.ts,**/routeTree.gen.ts,convex/_generated/**,\
  src/components/ui/**

# Files excluded from coverage calculation.
# Keep in sync with coverage.exclude in vite.config.ts.
sonar.coverage.exclusions=\
  src/main.tsx,\
  src/vite-env.d.ts,\
  src/features/setup/types.ts,\
  src/ConvexProviderWithAuthKit.tsx,\
  src/router.tsx,\
  src/ErrorBoundary.tsx,\
  src/i18n/index.ts,\
  src/routes/_authed/app.appointments.tsx,\
  src/routes/_authed/app.setup.tsx,\
  src/routes/_authed/app.snapshot.tsx

# Vitest coverage output consumed by SonarQube Cloud.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Required for local Docker-based scans (prevents hang on ARM Macs).
sonar.scm.disabled=true

# Suppress Tailwind CSS v4 false positive — @custom-variant is valid syntax.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e1.resourceKey=src/index.css
